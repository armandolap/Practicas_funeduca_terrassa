<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona — FunEduca CRM</title>
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <div id="clientContent"></div>
</main>
<div class="toast" id="toast"></div>
<div id="assignModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeAssignModal()">
  <div class="modal">
    <h2>Assignar projecte</h2>
    <div class="form-group">
      <label>Cerca projecte</label>
      <input type="text" id="projAssignSearch" placeholder="Nom del projecte..." oninput="debounceProjSearch()">
    </div>
    <div id="projAssignResults" style="max-height:300px;overflow-y:auto;"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeAssignModal()">Cancel·lar</button>
    </div>
  </div>
</div>
<script src="/js/sidebar.js"></script>
<script>
const clientId = new URLSearchParams(location.search).get('id');
let currentProjFilter = 'tots';

async function loadClient() {
    if (!requireAuth()) return;
    try {
        const res = await authFetch(`/client/${clientId}?filter=${currentProjFilter}`);
        const c = await res.json();
        if (!c || !c.idClient) { document.getElementById('clientContent').innerHTML = '<p>Persona no trobada</p>'; return; }

        const role = getRole();
        const canEdit = role === 1 || role === 2 || role === 3;
        const canAssignProj = role === 1 || role === 2 || role === 3 || role === 4;

        document.getElementById('clientContent').innerHTML = `
            <a class="back-link" href="/clients.html">← Tornar</a>
            <div class="detail-header">
                <h1>${c.Nom || ''} ${c.Cognoms || ''}</h1>
                <div class="subtitle">
                    ${canEdit ? `<button class="btn btn-sm btn-secondary" style="float:right" onclick="window.location.href='/crear-persona.html?id=${clientId}'">Editar</button>` : ''}
                </div>
            </div>
            <div class="card-grid">
                <div class="card">
                    <div class="detail-section"><div class="label">Edat</div><div class="value">${c.C_edad || 0} anys</div></div>
                    <div class="detail-section"><div class="label">Gènere</div><div class="value">${c.Nom_genere || ''}</div></div>
                    <div class="detail-section"><div class="label">Temps a l'entitat</div><div class="value">${c.C_temps_a_lentitat || '0'}</div></div>
                    <div class="detail-section"><div class="label">Activitats fetes</div><div class="value">${c.num_activitats || 0}</div></div>
                    <div class="detail-section"><div class="label">Rol familiar</div><div class="value">${c.Nom_rol || ''}</div></div>
                    <div class="detail-section"><div class="label">NESE</div><div class="value">${c.Nom_necessitat || 'No'}</div></div>
                    <div class="detail-section"><div class="label">Risc</div><div class="value">${c.risc_nivell || 'Sense risc'}</div></div>
                </div>
                <div class="card">
                    <div class="detail-section"><div class="label">Família</div><div class="value"><a href="/familia.html?id=${c.idFamilia}">${c.Cognom_familiar || ''}</a></div></div>
                    <div class="detail-section"><div class="label">Estructura familiar</div><div class="value">${c.estructura_familiar_nom || ''}</div></div>
                    <div class="detail-section"><div class="label">Domicili</div><div class="value">
                        ${c.tipus_via ? `<a href="/domicili.html?id=${c.idDomicili}">${c.tipus_via} ${c.Nom_calle || ''}, ${c.Num_calle || ''}${c.Pis ? `, ${c.Pis}${c.Escala ? `${c.Escala}` : ''}` : ''}</a>` : 'Sense domicili'}
                    </div></div>
                    <div class="detail-section"><div class="label">Telèfon</div><div class="value">${c.Telefon || '-'}</div></div>
                    <div class="detail-section"><div class="label">Correu</div><div class="value">${c.Correu_electronic || '-'}</div></div>
                    <div class="detail-section"><div class="label">Data d'alta</div><div class="value">${c.Data_d_alta ? new Date(c.Data_d_alta).toLocaleDateString() : '-'}</div></div>
                    ${c.Baixa ? `<div class="detail-section"><div class="label">Data baixa</div><div class="value">${c.Data_baixa ? new Date(c.Data_baixa).toLocaleDateString() : '-'} (${c.Nom_motiu_baixa || ''})</div></div>` : ''}
                </div>
            </div>
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h3>Projectes</h3>
                    <div style="display:flex;gap:8px;">
                        ${['tots','actius','futur','passats'].map(f =>
                            `<button class="btn btn-sm ${currentProjFilter === f ? 'btn-primary' : 'btn-secondary'}" onclick="setProjFilter('${f}')">${f.charAt(0).toUpperCase() + f.slice(1)}</button>`
                        ).join('')}
                        ${canAssignProj ? `<button class="btn btn-sm btn-success" onclick="showAssignProject()">+ Assignar</button>` : ''}
                    </div>
                </div>
                <table>
                    <thead><tr><th>Projecte</th><th>Estat</th><th>Inici</th><th>Fi</th>${canAssignProj ? '<th></th>' : ''}</tr></thead>
                    <tbody id="projectsBody"></tbody>
                </table>
            </div>
        `;
        renderProjects(c.projectes || [], canAssignProj);
    } catch (err) { document.getElementById('clientContent').innerHTML = '<p>Error carregant persona</p>'; }
}

function renderProjects(projects, canRemove) {
    const tbody = document.getElementById('projectsBody');
    if (!projects.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--color-text-soft);">Cap projecte</td></tr>';
        return;
    }
    tbody.innerHTML = projects.map(p => `
        <tr>
            <td><a href="/projecte.html?id=${p.idProyecto}">${p.Nom_projecte || ''}</a></td>
            <td><span class="badge ${p.estat_projecte === 'actiu' ? 'badge-green' : p.estat_projecte === 'futur' ? 'badge-blue' : 'badge-gray'}">${p.estat_projecte === 'actiu' ? 'Actiu' : p.estat_projecte === 'futur' ? 'Futur' : 'Tancat'}</span></td>
            <td>${p.fecha_inicio_act ? new Date(p.fecha_inicio_act).toLocaleDateString() : '-'}</td>
            <td>${p.fecha_fin_act ? new Date(p.fecha_fin_act).toLocaleDateString() : '-'}</td>
            ${canRemove ? `<td><button class="btn btn-sm btn-danger" onclick="removeFromProj(${p.idProyecto})">Treure</button></td>` : ''}
        </tr>
    `).join('');
}

function setProjFilter(f) {
    currentProjFilter = f;
    loadClient();
}

async function removeFromProj(projId) {
    if (!await confirmModal('Treure aquesta persona del projecte?')) return;
    try {
        showLoading();
        const res = await authFetch(`/projectes/${projId}/clients/${clientId}`, {
            method: 'DELETE'
        });
        if (res.ok) { showToast('Persona treta del projecte', 'success'); loadClient(); }
        else { showToast('Error', 'error'); }
    } catch (e) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

const debounceProjSearch = debounce(searchProjects, 300);

async function searchProjects() {
    const q = document.getElementById('projAssignSearch').value.trim();
    const list = document.getElementById('projAssignResults');
    if (q.length < 2) { list.innerHTML = ''; return; }
    const role = getRole();
    try {
        const params = new URLSearchParams({ q });
        if (role === 4) params.set('filter', 'actiu_futur');
        const res = await authFetch(`/projectes?${params}`);
        const projects = await res.json();
        if (projects.length) {
            list.innerHTML = projects.map(p => `
                <div style="padding:8px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;">
                    <span><strong>${p.Nom_projecte}</strong></span>
                    <button class="btn btn-sm btn-primary" onclick="assignProject(${p.idProyecto})">Assignar</button>
                </div>
            `).join('');
        } else {
            list.innerHTML = '<div style="padding:12px;color:var(--color-text-soft);">Cap projecte trobat</div>';
        }
    } catch (e) { list.innerHTML = '<div style="padding:12px;color:#e57373;">Error de connexió</div>'; }
}

function showAssignProject() {
    document.getElementById('assignModal').style.display = 'flex';
    document.getElementById('projAssignSearch').value = '';
    document.getElementById('projAssignResults').innerHTML = '';
    document.getElementById('projAssignSearch').focus();
}

function closeAssignModal() {
    document.getElementById('assignModal').style.display = 'none';
    document.getElementById('projAssignResults').innerHTML = '';
    document.getElementById('projAssignSearch').value = '';
}

async function assignProject(projId) {
    try {
        showLoading();
        const addRes = await authFetch(`/projectes/${projId}/clients`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientIds: [parseInt(clientId)] })
        });
        if (addRes.ok) { showToast('Assignat correctament', 'success'); closeAssignModal(); loadClient(); }
        else { showToast('Error assignant', 'error'); }
    } catch (e) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

renderSidebar('clients');
if (!clientId) document.getElementById('clientContent').innerHTML = '<p>ID de persona no proporcionat</p>';
else loadClient();
</script>
</body>
</html>
