<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona — FunEduca CRM</title>
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <div id="clientContent"></div>
</main>
<div class="toast" id="toast"></div>
<div id="assignModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeAssignModal()">
  <div class="modal">
    <h2>Assignar projecte</h2>
    <div class="form-group">
      <label>Cerca projecte</label>
      <input type="text" id="projAssignSearch" placeholder="Nom del projecte..." oninput="debounceProjSearch()">
    </div>
    <div id="projAssignResults" style="max-height:300px;overflow-y:auto;"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeAssignModal()">Cancel·lar</button>
    </div>
  </div>
</div>
<div id="baixaModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeBaixaModal()">
  <div class="modal">
    <h2>Donar de baixa</h2>
    <div class="form-group">
      <label>Motiu de baixa</label>
      <select id="baixaMotiuSelect"></select>
    </div>
    <div class="form-group">
      <label>Data de baixa</label>
      <input type="date" id="baixaDataInput">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeBaixaModal()">Cancel·lar</button>
      <button class="btn btn-danger" onclick="confirmBaixa()">Donar de baixa</button>
    </div>
  </div>
</div>
<div id="nacModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeNacModal()">
  <div class="modal">
    <h2>Afegir nacionalitat</h2>
    <div class="form-group">
      <label>País</label>
      <select id="nacSelect"></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeNacModal()">Cancel·lar</button>
      <button class="btn btn-primary" onclick="addNacionalitat()">Afegir</button>
    </div>
  </div>
</div>
<script src="/js/sidebar.js"></script>
<script src="/js/validate.js"></script>
<script>
const clientId = new URLSearchParams(location.search).get('id');
let currentProjFilter = 'tots';

async function loadClient() {
    if (!requireAuth()) return;
    try {
        const res = await authFetch(`/client/${clientId}?filter=${currentProjFilter}`);
        const c = await res.json();
        if (!c || !c.idClient) { document.getElementById('clientContent').innerHTML = '<p>Persona no trobada</p>'; return; }

        const role = getRole();
        const canEdit = role === 1 || role === 2 || role === 3;
        const canAssignProj = role === 1 || role === 2 || role === 3 || role === 4;

        const nacs = c.nacionalitats || [];
        document.getElementById('clientContent').innerHTML = `
            <a class="back-link" href="/clients.html">← Tornar</a>
            <div class="detail-header">
                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between;">
                    <h1 style="margin-bottom:0;">${c.Nom || ''} ${c.Cognoms || ''}</h1>
                    ${canEdit ? `<button class="btn btn-sm btn-secondary" onclick="window.location.href='/crear-persona.html?id=${clientId}'">Editar</button>` : ''}
                </div>
            </div>
            <div class="card-grid card-grid-3">
                <div class="card">
                    <div class="detail-section"><div class="label">Edat</div><div class="value">${c.C_edad || 0} anys</div></div>
                    <div class="detail-section"><div class="label">Gènere</div><div class="value">${c.Nom_genere || ''}</div></div>
                    <div class="detail-section"><div class="label">Temps a l'entitat</div><div class="value">${c.C_temps_a_lentitat || '0'}</div></div>
                    <div class="detail-section"><div class="label">Activitats fetes</div><div class="value">${c.num_activitats || 0}</div></div>
                    <div class="detail-section"><div class="label">Rol familiar</div><div class="value">${c.Nom_rol || ''}</div></div>
                    <div class="detail-section"><div class="label">NESE</div><div class="value">${c.Nom_necessitat || 'No'}</div></div>
                    <div class="detail-section"><div class="label">Risc</div><div class="value">${c.risc_nivell || 'Sense risc'}</div></div>
                </div>
                <div class="card">
                    <div class="detail-section"><div class="label">Família</div><div class="value"><a href="/familia.html?id=${c.idFamilia}">${c.Cognom_familiar || ''}</a></div></div>
                    <div class="detail-section"><div class="label">Estructura familiar</div><div class="value">${c.estructura_familiar_nom || ''}</div></div>
                    <div class="detail-section"><div class="label">Domicili</div><div class="value">
                        ${c.tipus_via ? `<a href="/domicili.html?id=${c.idDomicili}">${c.tipus_via} ${c.Nom_calle || ''}, ${c.Num_calle || ''}${c.Pis ? `, ${c.Pis}${c.Escala ? `${c.Escala}` : ''}` : ''}</a>` : 'Sense domicili'}
                    </div></div>
                    <div class="detail-section"><div class="label">Telèfon</div><div class="value">${c.Telefon || '-'}</div></div>
                    <div class="detail-section"><div class="label">Correu</div><div class="value">${c.Correu_electronic || '-'}</div></div>
                    <div class="detail-section"><div class="label">Data d'alta</div><div class="value">${c.Data_d_alta ? new Date(c.Data_d_alta).toLocaleDateString() : '-'}</div></div>
                </div>
                <div class="card">
                    <div class="detail-section">
                        <div class="label">País de naixement</div>
                        <div class="value">${c.pais_naixement_nom || '-'}</div>
                    </div>
                    <div class="detail-section">
                        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;">
                            <div class="label" style="margin-bottom:0;">Nacionalitats</div>
                            ${canEdit ? `<button class="btn btn-sm btn-success" onclick="showAddNacionalitat()">+ Afegir nacionalitat</button>` : ''}
                        </div>
                        <div id="nacionalitatsList"></div>
                    </div>
                    <div class="detail-section" style="margin-bottom:0;">
                        <div class="label">De baixa</div>
                        <div class="value">
                            ${c.Baixa
                                ? `<span class="badge badge-red">Sí</span>
                                   <div style="margin-top:6px;font-weight:400;font-size:var(--fs-sm);">
                                       Data: ${c.Data_baixa ? new Date(c.Data_baixa).toLocaleDateString() : '-'}<br>
                                       Motiu: ${c.Nom_motiu_baixa || '-'}
                                   </div>
                                   ${canEdit ? `<button class="btn btn-sm btn-secondary" style="margin-top:8px;" onclick="donarAlta()">Donar d'alta</button>` : ''}`
                                : `<span class="badge badge-green">No</span>
                                   ${canEdit ? `<div style="margin-top:8px;"><button class="btn btn-sm btn-danger" onclick="showBaixa()">Donar de baixa</button></div>` : ''}`}
                        </div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h3>Projectes</h3>
                    <div style="display:flex;gap:8px;">
                        ${['tots','actius','futur','passats'].map(f =>
                            `<button class="btn btn-sm ${currentProjFilter === f ? 'btn-primary' : 'btn-secondary'}" onclick="setProjFilter('${f}')">${f.charAt(0).toUpperCase() + f.slice(1)}</button>`
                        ).join('')}
                        ${canAssignProj ? `<button class="btn btn-sm btn-success" onclick="showAssignProject()">+ Assignar</button>` : ''}
                    </div>
                </div>
                <table>
                    <thead><tr><th>Projecte</th><th>Estat</th><th>Inici</th><th>Fi</th>${canAssignProj ? '<th></th>' : ''}</tr></thead>
                    <tbody id="projectsBody"></tbody>
                </table>
            </div>
        `;
        renderProjects(c.projectes || [], canAssignProj);
        renderNacionalitats(nacs, canEdit);
    } catch (err) { document.getElementById('clientContent').innerHTML = '<p>Error carregant persona</p>'; }
}

function renderNacionalitats(nacs, canEdit) {
    const el = document.getElementById('nacionalitatsList');
    if (!el) return;
    if (!nacs.length) {
        el.innerHTML = '<div class="value" style="font-weight:400;color:var(--color-text-soft);">Sense nacionalitats</div>';
        return;
    }
    el.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:6px;">${nacs.map(n => `
        <span class="badge badge-blue" style="display:inline-flex;align-items:center;gap:6px;">
            ${n.Nom_pais}
            ${canEdit ? `<button onclick="removeNacionalitat(${n.idPais})" title="Treure" style="border:none;background:none;cursor:pointer;color:inherit;font-weight:700;line-height:1;padding:0;">×</button>` : ''}
        </span>
    `).join('')}</div>`;
}

function renderProjects(projects, canRemove) {
    const tbody = document.getElementById('projectsBody');
    if (!projects.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--color-text-soft);">Cap projecte</td></tr>';
        return;
    }
    tbody.innerHTML = projects.map(p => `
        <tr>
            <td><a href="/projecte.html?id=${p.idProyecto}">${p.Nom_projecte || ''}</a></td>
            <td><span class="badge ${p.estat_projecte === 'actiu' ? 'badge-green' : p.estat_projecte === 'futur' ? 'badge-blue' : 'badge-gray'}">${p.estat_projecte === 'actiu' ? 'Actiu' : p.estat_projecte === 'futur' ? 'Futur' : 'Tancat'}</span></td>
            <td>${p.fecha_inicio_act ? new Date(p.fecha_inicio_act).toLocaleDateString() : '-'}</td>
            <td>${p.fecha_fin_act ? new Date(p.fecha_fin_act).toLocaleDateString() : '-'}</td>
            ${canRemove ? `<td><button class="btn btn-sm btn-danger" onclick="removeFromProj(${p.idProyecto})">Treure</button></td>` : ''}
        </tr>
    `).join('');
}

function setProjFilter(f) {
    currentProjFilter = f;
    loadClient();
}

async function removeFromProj(projId) {
    if (!await confirmModal('Treure aquesta persona del projecte?')) return;
    try {
        showLoading();
        const res = await authFetch(`/projectes/${projId}/clients/${clientId}`, {
            method: 'DELETE'
        });
        if (res.ok) { showToast('Persona treta del projecte', 'success'); loadClient(); }
        else { showToast('Error', 'error'); }
    } catch (e) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

const debounceProjSearch = debounce(searchProjects, 300);

async function searchProjects() {
    const q = document.getElementById('projAssignSearch').value.trim();
    const list = document.getElementById('projAssignResults');
    if (q.length < 2) { list.innerHTML = ''; return; }
    const role = getRole();
    try {
        const params = new URLSearchParams({ q });
        if (role === 4) params.set('filter', 'actiu_futur');
        const res = await authFetch(`/projectes?${params}`);
        const projects = await res.json();
        if (projects.length) {
            list.innerHTML = projects.map(p => `
                <div style="padding:8px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;">
                    <span><strong>${p.Nom_projecte}</strong></span>
                    <button class="btn btn-sm btn-primary" onclick="assignProject(${p.idProyecto})">Assignar</button>
                </div>
            `).join('');
        } else {
            list.innerHTML = '<div style="padding:12px;color:var(--color-text-soft);">Cap projecte trobat</div>';
        }
    } catch (e) { list.innerHTML = '<div style="padding:12px;color:#e57373;">Error de connexió</div>'; }
}

function showAssignProject() {
    document.getElementById('assignModal').style.display = 'flex';
    document.getElementById('projAssignSearch').value = '';
    document.getElementById('projAssignResults').innerHTML = '';
    document.getElementById('projAssignSearch').focus();
}

function closeAssignModal() {
    document.getElementById('assignModal').style.display = 'none';
    document.getElementById('projAssignResults').innerHTML = '';
    document.getElementById('projAssignSearch').value = '';
}

async function assignProject(projId) {
    try {
        showLoading();
        const addRes = await authFetch(`/projectes/${projId}/clients`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientIds: [parseInt(clientId)] })
        });
        if (addRes.ok) { showToast('Assignat correctament', 'success'); closeAssignModal(); loadClient(); }
        else { showToast('Error assignant', 'error'); }
    } catch (e) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

let paisosCache = null;
let motiusBaixaCache = null;

async function showBaixa() {
    const modal = document.getElementById('baixaModal');
    const select = document.getElementById('baixaMotiuSelect');
    const dataInput = document.getElementById('baixaDataInput');
    modal.style.display = 'flex';
    const today = new Date().toISOString().split('T')[0];
    dataInput.value = today;
    dataInput.max = today;
    if (!motiusBaixaCache) {
        select.innerHTML = '<option>Carregant...</option>';
        try {
            const res = await authFetch('/motiuBaixa');
            motiusBaixaCache = await res.json();
        } catch (e) { showToast('Error carregant motius', 'error'); motiusBaixaCache = []; }
    }
    select.innerHTML = '<option value="">Selecciona un motiu...</option>' +
        motiusBaixaCache.map(m => `<option value="${m.idMotiu_baixa}">${m.Nom_motiu_baixa}</option>`).join('');
    select.focus();
}

function closeBaixaModal() {
    document.getElementById('baixaModal').style.display = 'none';
}

async function confirmBaixa() {
    const Motiu_baixa = parseInt(document.getElementById('baixaMotiuSelect').value);
    const Data_baixa = document.getElementById('baixaDataInput').value;
    if (!Motiu_baixa) { showToast('Selecciona un motiu', 'error'); return; }
    if (!Data_baixa) { showToast('Indica la data', 'error'); return; }
    try {
        showLoading();
        const res = await authFetch(`/client/${clientId}/baixa`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Motiu_baixa, Data_baixa })
        });
        if (res.ok) { showToast('Persona donada de baixa', 'success'); closeBaixaModal(); loadClient(); }
        else { const d = await res.json().catch(() => ({})); showToast(d.message || 'Error', 'error'); }
    } catch (e) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

async function donarAlta() {
    if (!await confirmModal('Tornar a donar d\'alta aquesta persona?')) return;
    try {
        showLoading();
        const res = await authFetch(`/client/${clientId}/alta`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
        });
        if (res.ok) { showToast('Persona donada d\'alta', 'success'); loadClient(); }
        else { showToast('Error', 'error'); }
    } catch (e) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

async function showAddNacionalitat() {
    const modal = document.getElementById('nacModal');
    const select = document.getElementById('nacSelect');
    modal.style.display = 'flex';
    if (!paisosCache) {
        select.innerHTML = '<option>Carregant...</option>';
        try {
            const res = await authFetch('/paisos');
            paisosCache = await res.json();
        } catch (e) { showToast('Error carregant països', 'error'); paisosCache = []; }
    }
    select.innerHTML = '<option value="">Selecciona un país...</option>' +
        paisosCache.map(p => `<option value="${p.idPais}">${p.Nom_pais}</option>`).join('');
    select.focus();
}

function closeNacModal() {
    document.getElementById('nacModal').style.display = 'none';
}

async function addNacionalitat() {
    const idPais = parseInt(document.getElementById('nacSelect').value);
    if (!idPais) { showToast('Selecciona un país', 'error'); return; }
    try {
        showLoading();
        const res = await authFetch(`/client/${clientId}/nacionalitats`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idPais })
        });
        if (res.ok) { showToast('Nacionalitat afegida', 'success'); closeNacModal(); loadClient(); }
        else { const d = await res.json().catch(() => ({})); showToast(d.message || 'Error', 'error'); }
    } catch (e) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

async function removeNacionalitat(idPais) {
    if (!await confirmModal('Treure aquesta nacionalitat?')) return;
    try {
        showLoading();
        const res = await authFetch(`/client/${clientId}/nacionalitats/${idPais}`, { method: 'DELETE' });
        if (res.ok) { showToast('Nacionalitat treta', 'success'); loadClient(); }
        else { showToast('Error', 'error'); }
    } catch (e) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

renderSidebar('clients');
if (!clientId) document.getElementById('clientContent').innerHTML = '<p>ID de persona no proporcionat</p>';
else loadClient();
</script>
</body>
</html>
