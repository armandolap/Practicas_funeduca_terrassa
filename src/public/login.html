<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inici de Sessió — FunEduca CRM</title>
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--color-primary); }
.login-box { background: var(--color-surface); padding: 40px; border-radius: 16px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.login-box .brand-logo { display: block; width: 100%; max-width: 260px; height: auto; margin: 0 auto 24px; padding: 0 28px; background: var(--color-primary); border-radius: 10px; }
.login-box h1 { text-align: center; margin-bottom: 24px; font-size: var(--fs-md); font-weight: 500; color: var(--color-text-muted); letter-spacing: 0.08em; }
.login-box .form-group { margin-bottom: 18px; }
.login-box label { font-size: var(--fs-sm); font-weight: 600; color: var(--color-label); }
.login-box input { width: 100%; padding: 10px 14px; border: 1px solid var(--color-border-input); border-radius: 8px; font-size: var(--fs-base); font-family: var(--font-sans); }
.login-box input:focus { border-color: var(--color-primary); box-shadow: var(--focus-ring); outline: none; }
.login-box .btn { width: 100%; padding: 10px; font-size: var(--fs-md); justify-content: center; }
.login-box .error { color: var(--color-danger); font-size: var(--fs-sm); margin-bottom: 12px; display: none; }
</style>
</head>
<body>
<div class="login-box">
  <img class="brand-logo" src="/images/funeduca-logo.png" alt="Funeduca">
  <div class="error" id="errorMsg"></div>
  <div class="form-group">
    <label for="username">Usuari</label>
    <input type="text" id="username" placeholder="usuari" autofocus>
  </div>
  <div class="form-group">
    <label for="password">Contrasenya</label>
    <input type="password" id="password" placeholder="admin123">
  </div>
  <button class="btn btn-primary" id="btnLogin" onclick="login()">Iniciar Sessió</button>
</div>
<script src="/js/validate.js"></script>
<script>
async function login() {
  const errorEl = document.getElementById('errorMsg');
  const btn = document.getElementById('btnLogin');

  const v = validateForm([
    { id: 'username', rules: ['required'] },
    { id: 'password', rules: ['required'] },
  ]);
  if (!v.ok) return;

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span> Entrant...';
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.message || 'Error al iniciar sessió';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Iniciar Sessió';
      return;
    }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    const dest = (data.user.idNivel_acceso === 2 || data.user.idNivel_acceso === 3)
      ? '/meus-projectes.html' : '/clients.html';
    // Deixa l'avís pendent perquè surti a la pàgina de destí i redirigeix immediatament
    try { sessionStorage.setItem('pendingToast', JSON.stringify({ msg: `Sessió iniciada. Benvingut/da, ${data.user.Nom || ''}!`, type: 'success' })); } catch {}
    window.location.href = dest;
  } catch (err) {
    errorEl.textContent = 'Error de connexió';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Iniciar Sessió';
  }
}
if (localStorage.getItem('token')) {
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (user.idNivel_acceso === 2 || user.idNivel_acceso === 3) {
    window.location.href = '/meus-projectes.html';
  } else {
    window.location.href = '/clients.html';
  }
}
</script>
</body>
</html>
