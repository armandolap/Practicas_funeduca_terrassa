<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informes — FunEduca CRM</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <h1>Informes</h1>
  <div class="filters" style="flex-wrap:wrap;">
    <button class="btn btn-sm btn-secondary" data-report="projectes/generesEdats" onclick="loadReport('projectes/generesEdats')">Projectes/Gènere-Edat</button>
    <button class="btn btn-sm btn-secondary" data-report="genere" onclick="loadReport('genere')">Gènere</button>
    <button class="btn btn-sm btn-secondary" data-report="sitEco" onclick="loadReport('sitEco')">Situació Econòmica</button>
    <button class="btn btn-sm btn-secondary" data-report="rolFam" onclick="loadReport('rolFam')">Rol Familiar</button>
    <button class="btn btn-sm btn-secondary" data-report="tipHab" onclick="loadReport('tipHab')">Tipus Habitatge</button>
    <button class="btn btn-sm btn-secondary" data-report="cont" onclick="loadReport('cont')">Comptadors</button>
    <button class="btn btn-sm btn-secondary" data-report="neses" onclick="loadReport('neses')">NESE</button>
    <button class="btn btn-sm btn-secondary" data-report="sebasDev" onclick="loadReport('sebasDev')">SEBAS/Deriv.</button>
    <button class="btn btn-sm btn-secondary" data-report="cursAcademic" onclick="loadReport('cursAcademic')">Curs/Res. Acadèmic</button>
    <button class="btn btn-sm btn-secondary" data-report="resAcad" onclick="loadReport('resAcad')">Res. Acadèmic</button>
    <button class="btn btn-sm btn-secondary" data-report="motiusBaixa" onclick="loadReport('motiusBaixa')">Motius Baixa</button>
    <button class="btn btn-sm btn-secondary" data-report="riscos" onclick="loadReport('riscos')">Riscos</button>
    <button class="btn btn-sm btn-secondary" data-report="paisos" onclick="loadReport('paisos')">Països</button>
  </div>
  <div class="filters" style="justify-content:flex-end;">
    <button class="btn btn-sm btn-success" onclick="exportCSV()">Exportar CSV</button>
    <button class="btn btn-sm btn-primary" onclick="exportAllCSV()">Exportar Tots</button>
  </div>
  <div class="card" id="reportContent">
    <p style="color:#94a3b8;text-align:center;padding:40px;">Selecciona un informe per visualitzar-lo</p>
  </div>
</main>
<script src="/js/sidebar.js"></script>
<script>
let currentReport = null;
let currentData = null;

async function loadReport(name) {
    if (!requireAuth()) return;
    document.querySelectorAll('[data-report]').forEach(b => b.className = 'btn btn-sm btn-secondary');
    document.querySelector(`[data-report="${name}"]`).className = 'btn btn-sm btn-primary';
    currentReport = name;

    try {
        const res = await authFetch(`/reports/${name}`);
        const data = await res.json();
        currentData = data;
        renderReport(name, data);
    } catch (err) {
        document.getElementById('reportContent').innerHTML = '<p style="color:#ef4444;">Error carregant informe</p>';
    }
}

function renderReport(name, data) {
    const div = document.getElementById('reportContent');
    if (!data || (Array.isArray(data) && data.length === 0)) {
        div.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px;">Sense dades</p>';
        return;
    }

    let html = '<div class="table-wrap"><table><thead><tr>';
    const keys = Array.isArray(data) ? Object.keys(data[0]) : Object.keys(data);
    html += keys.map(k => `<th>${k.replace(/_/g, ' ')}</th>`).join('') + '</tr></thead><tbody>';

    if (Array.isArray(data)) {
        data.forEach(row => {
            html += '<tr>' + keys.map(k => `<td>${row[k] ?? ''}</td>`).join('') + '</tr>';
        });
    } else {
        // Single object
        html += '<tr>' + keys.map(k => `<td>${typeof data[k] === 'object' ? JSON.stringify(data[k]) : data[k] ?? ''}</td>`).join('') + '</tr>';
    }

    html += '</tbody></table></div>';
    div.innerHTML = html;
}

function convertToCSV(data) {
    if (!data) return '';
    const items = Array.isArray(data) ? data : [data];
    if (!items.length) return '';
    const keys = Object.keys(items[0]);
    let csv = keys.map(k => `"${k}"`).join(',') + '\n';
    items.forEach(row => {
        csv += keys.map(k => `"${(row[k] ?? '').toString().replace(/"/g, '""')}"`).join(',') + '\n';
    });
    return csv;
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);
}

function exportCSV() {
    if (!currentReport || !currentData) { alert('Selecciona un informe primer'); return; }
    const csv = convertToCSV(currentData);
    downloadCSV(csv, `informe_${currentReport.replace(/\//g, '_')}.csv`);
}

async function exportAllCSV() {
    const reports = ['projectes/generesEdats', 'genere', 'sitEco', 'rolFam', 'tipHab', 'cont', 'neses', 'sebasDev', 'cursAcademic', 'resAcad', 'motiusBaixa', 'riscos', 'paisos'];
    let allCsv = '';
    for (const name of reports) {
        try {
            const res = await authFetch(`/reports/${name}`);
            const data = await res.json();
            allCsv += `\n=== ${name} ===\n`;
            allCsv += convertToCSV(data);
        } catch {}
    }
    downloadCSV(allCsv, 'tots_informes.csv');
}

renderSidebar('informes');
</script>
</body>
</html>
