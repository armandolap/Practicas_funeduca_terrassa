<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informes — FunEduca CRM</title>
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <h1>Informes</h1>
  <div class="filters" style="flex-wrap:wrap;align-items:flex-end;gap:16px;">
    <div class="form-group" style="margin-bottom:0;min-width:240px;">
      <label>Informe</label>
      <select id="reportSelect" onchange="loadReport(this.value)">
        <option value="">-- Selecciona un informe --</option>
        <option value="projectes/generesEdats">Projectes/Gènere-Edat</option>
        <option value="genere">Gènere</option>
        <option value="sitEco">Situació Econòmica</option>
        <option value="rolFam">Rol Familiar</option>
        <option value="tipHab">Tipus Habitatge</option>
        <option value="cont">Comptadors</option>
        <option value="neses">NESE</option>
        <option value="sebasDev">SEBAS/Deriv.</option>
        <option value="cursAcademic">Curs/Res. Acadèmic</option>
        <option value="resAcad">Res. Acadèmic</option>
        <option value="motiusBaixa">Motius Baixa</option>
        <option value="riscos">Riscos</option>
        <option value="paisos">Països</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:0;min-width:160px;">
      <label>Any lectiu</label>
      <select id="anyLectiuSelect" onchange="if(currentReport)loadReport(currentReport)">
        <option value="">Tots els anys</option>
      </select>
    </div>
  </div>
  <div class="filters" style="justify-content:flex-end;">
    <button class="btn btn-sm btn-success" onclick="exportCSV()">Exportar CSV</button>
    <button class="btn btn-sm btn-primary" onclick="exportAllCSV()">Exportar Tots</button>
  </div>
  <div class="card" id="reportContent">
    <p style="color:var(--color-text-soft);text-align:center;padding:40px;">Selecciona un informe per visualitzar-lo</p>
  </div>
</main>
<script src="/js/sidebar.js"></script>
<script>
let currentReport = null;
let currentData = null;

async function loadReport(name) {
    if (!requireAuth()) return;
    if (!name) {
        currentReport = null;
        currentData = null;
        document.getElementById('reportContent').innerHTML = '<p style="color:var(--color-text-soft);text-align:center;padding:40px;">Selecciona un informe per visualitzar-lo</p>';
        return;
    }
    currentReport = name;
    document.getElementById('reportSelect').value = name;

    try {
        const anyLectiu = document.getElementById('anyLectiuSelect').value;
        const params = anyLectiu ? `?anyLectiu=${encodeURIComponent(anyLectiu)}` : '';
        const res = await authFetch(`/reports/${name}${params}`);
        const data = await res.json();
        currentData = data;
        renderReport(name, data);
    } catch (err) {
        document.getElementById('reportContent').innerHTML = '<p style="color:#e57373;">Error carregant informe</p>';
    }
}

async function loadAnysLectius() {
    const sel = document.getElementById('anyLectiuSelect');
    try {
        const res = await authFetch('/desplegables/curs_lectiu');
        if (!res.ok) throw new Error();
        const cursos = await res.json();
        sel.innerHTML = '<option value="">Tots els anys</option>' +
            cursos.map(c => `<option value="${c.id}">${c.Nom}</option>`).join('');
    } catch (e) {
        sel.innerHTML = '<option value="">Tots els anys</option>';
    }
}

function renderReport(name, data) {
    const div = document.getElementById('reportContent');
    if (!data || (Array.isArray(data) && data.length === 0)) {
        div.innerHTML = '<p style="color:var(--color-text-soft);text-align:center;padding:20px;">Sense dades</p>';
        return;
    }

    let html = '<div class="table-wrap"><table><thead><tr>';
    const keys = Array.isArray(data) ? Object.keys(data[0]) : Object.keys(data);
    html += keys.map(k => `<th>${k.replace(/_/g, ' ')}</th>`).join('') + '</tr></thead><tbody>';

    if (Array.isArray(data)) {
        data.forEach(row => {
            html += '<tr>' + keys.map(k => `<td>${row[k] ?? ''}</td>`).join('') + '</tr>';
        });
    } else {
        // Single object
        html += '<tr>' + keys.map(k => `<td>${typeof data[k] === 'object' ? JSON.stringify(data[k]) : data[k] ?? ''}</td>`).join('') + '</tr>';
    }

    html += '</tbody></table></div>';
    div.innerHTML = html;
}

function convertToCSV(data) {
    if (!data) return '';
    const items = Array.isArray(data) ? data : [data];
    if (!items.length) return '';
    const keys = Object.keys(items[0]);
    let csv = keys.map(k => `"${k}"`).join(',') + '\n';
    items.forEach(row => {
        csv += keys.map(k => `"${(row[k] ?? '').toString().replace(/"/g, '""')}"`).join(',') + '\n';
    });
    return csv;
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);
}

function exportCSV() {
    if (!currentReport || !currentData) { alertModal('Selecciona un informe primer'); return; }
    const csv = convertToCSV(currentData);
    downloadCSV(csv, `informe_${currentReport.replace(/\//g, '_')}.csv`);
}

async function exportAllCSV() {
    const reports = ['projectes/generesEdats', 'genere', 'sitEco', 'rolFam', 'tipHab', 'cont', 'neses', 'sebasDev', 'cursAcademic', 'resAcad', 'motiusBaixa', 'riscos', 'paisos'];
    const anyLectiu = document.getElementById('anyLectiuSelect').value;
    const params = anyLectiu ? `?anyLectiu=${encodeURIComponent(anyLectiu)}` : '';
    let allCsv = '';
    for (const name of reports) {
        try {
            const res = await authFetch(`/reports/${name}${params}`);
            const data = await res.json();
            allCsv += `\n=== ${name} ===\n`;
            allCsv += convertToCSV(data);
        } catch {}
    }
    downloadCSV(allCsv, 'tots_informes.csv');
}

renderSidebar('informes');
loadAnysLectius();
</script>
</body>
</html>
