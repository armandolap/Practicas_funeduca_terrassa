<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear Usuari</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body data-page="usuaris">
<aside class="sidebar">
  <div id="sidebarConfig" class="sidebar-item" data-page="config">Configuració</div>
  <div class="sidebar-item" data-page="projectes">Projectes</div>
  <div class="sidebar-item" data-page="clients">Clients</div>
  <div class="sidebar-item" data-page="families">Famílies</div>
  <div class="sidebar-item" data-page="usuaris">Usuaris</div>
  <div class="sidebar-item" data-page="domicilis">Domicilis</div>
  <div class="sidebar-item" data-page="persones">Persones-Famílies</div>
  <div class="sidebar-item" data-page="persona">Crear persona</div>
  <hr>
  <div class="sidebar-item" data-page="informes">Informes</div>
  <div class="sidebar-item" id="sidebarLogout">Tancar sessió</div>
</aside>

<main class="main-content">
  <h1>Crear Usuari</h1>

  <div class="form-container">
    <div class="form-group required">
      <label for="inputNom">Nom</label>
      <input type="text" id="inputNom" required>
    </div>
    <div class="form-group required">
      <label for="inputCognoms">Cognoms</label>
      <input type="text" id="inputCognoms" required>
    </div>
    <div class="form-group required">
      <label for="inputEmail">Email</label>
      <input type="email" id="inputEmail" required>
    </div>
    <div class="form-group required">
      <label for="inputTelefon">Telèfon</label>
      <input type="text" id="inputTelefon" required>
    </div>
    <div class="form-group required">
      <label for="inputNivell">Nivell d'accés</label>
      <select id="inputNivell" required><option value="">-- Selecciona --</option></select>
    </div>
    <div class="form-group required">
      <label for="inputPassword">Contrasenya</label>
      <input type="password" id="inputPassword" required>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="btnSubmit">CREAR USUARI</button>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script src="/js/sidebar.js"></script>
<script>
(function() {
  const token = localStorage.getItem("token");
  if (!token) { window.location.href = "/login.html"; return; }
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    const role = payload.idNivel_acceso;
    if (role !== 1) { window.location.href = "/usuaris.html"; return; }
    const configEl = document.getElementById("sidebarConfig");
    if (configEl) configEl.style.display = "block";
    const page = document.querySelector(`[data-page="${document.body.dataset.page}"]`);
    if (page) page.classList.add("active");
  } catch(e) { window.location.href = "/login.html"; }
  document.addEventListener("click", function(e) {
    if (e.target.id === "sidebarLogout") {
      localStorage.removeItem("token"); localStorage.removeItem("user"); window.location.href = "/login.html";
    }
    const item = e.target.closest(".sidebar-item[data-page]");
    if (item) {
      const map = { projectes: "/projectes.html", clients: "/clients.html", families: "/families.html", usuaris: "/usuaris.html", domicilis: "/domicilis.html", informes: "/informes.html", config: "/config.html", persones: "/persones-families.html", persona: "/index.html" };
      if (map[item.dataset.page]) window.location.href = map[item.dataset.page];
    }
  });
})();
</script>
<script src="/js/usuari-crear.js"></script>
</body>
</html>
