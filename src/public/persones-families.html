<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persones i Famílies — FunEduca CRM</title>
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <h1>Persones i Famílies</h1>
  <div class="filters">
    <input type="text" id="searchQ" placeholder="Cerca per nom o cognom..." oninput="debounceSearch()">
    <label>Gènere</label>
    <select id="genereFilter" onchange="search()"><option value="">Tots</option></select>
    <label>Barri</label>
    <select id="barriFilter" onchange="search()"><option value="">Tots</option></select>
    <label>Estructura familiar</label>
    <select id="estructuraFilter" onchange="search()"><option value="">Totes</option></select>
    <a href="/crear-persona.html" class="btn btn-success btn-sm">+ Crear</a>
  </div>
  <div class="card">
    <h3>Famílies</h3>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Cognom</th><th>Membres</th><th>Estructura</th></tr></thead>
        <tbody id="familyResults"></tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <h3>Persones</h3>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nom</th><th>Cognoms</th><th>Edat</th><th>Gènere</th><th>Família</th></tr></thead>
        <tbody id="personResults"></tbody>
      </table>
    </div>
  </div>
</main>
<script src="/js/sidebar.js"></script>
<script>
const debounceSearch = debounce(search, 300);

async function loadFilters() {
    try {
        const [genRes, barriRes, estRes] = await Promise.all([
            authFetch('/genere'),
            authFetch('/barri'),
            authFetch('/estFamilia')
        ]);
        document.getElementById('genereFilter').innerHTML = '<option value="">Tots</option>' + (await genRes.json()).map(g => `<option value="${g.idGenere}">${g.Nom_genere}</option>`).join('');
        document.getElementById('barriFilter').innerHTML = '<option value="">Tots</option>' + (await barriRes.json()).map(b => `<option value="${b.idBarri}">${b.Nom}</option>`).join('');
        document.getElementById('estructuraFilter').innerHTML = '<option value="">Totes</option>' + (await estRes.json()).map(e => `<option value="${e.idEstructura_familiar}">${e.Nom_est_fam}</option>`).join('');
    } catch {}
}

async function search() {
    if (!requireAuth()) return;
    const q = document.getElementById('searchQ').value.trim();
    const genere = document.getElementById('genereFilter').value;
    const barri = document.getElementById('barriFilter').value;
    const estructura = document.getElementById('estructuraFilter').value;

    try {
        const famParams = new URLSearchParams({ limit: 10 });
        if (q) famParams.set('q', q);
        if (estructura) famParams.set('estructura', estructura);
        if (barri) famParams.set('barri', barri);
        const famRes = await authFetch(`/familia?${famParams}`);
        const famData = await famRes.json();
        const families = famData.rows || famData || [];
        document.getElementById('familyResults').innerHTML = families.map(f => `
            <tr class="clickable" onclick="window.location.href='/familia.html?id=${f.idFamilia}'">
                <td>${f.Cognom_familiar || ''}</td>
                <td>${f.num_membres || 0}</td>
                <td>${f.estructura_familiar_nom || ''}</td>
            </tr>
        `).join('') || '<tr><td colspan="3" style="text-align:center;color:var(--color-text-soft);">Cap resultat</td></tr>';

        const perParams = new URLSearchParams({ limit: 10 });
        if (q) perParams.set('q', q);
        if (genere) perParams.set('genere', genere);
        if (barri) perParams.set('barri', barri);
        const perRes = await authFetch(`/client?${perParams}`);
        const perData = await perRes.json();
        const persons = perData.rows || perData || [];
        document.getElementById('personResults').innerHTML = persons.map(p => `
            <tr class="clickable" onclick="window.location.href='/client.html?id=${p.idClient}'">
                <td>${p.Nom || ''}</td>
                <td>${p.Cognoms || ''}</td>
                <td>${p.C_edad || 0}</td>
                <td>${p.Nom_genere || ''}</td>
                <td>${p.Cognom_familiar || ''}</td>
            </tr>
        `).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--color-text-soft);">Cap resultat</td></tr>';
    } catch {}
}

renderSidebar('clients');
loadFilters();
search();
</script>
</body>
</html>
