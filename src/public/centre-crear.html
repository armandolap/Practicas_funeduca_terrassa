<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear Centre — FunEduca CRM</title>
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>.autocomplete-dropdown { position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e2e8f0;border-radius:0 0 6px 6px;max-height:200px;overflow-y:auto;z-index:100; }</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <h1 id="formTitle">Crear Centre d'activitats</h1>
  <form id="centreForm" onsubmit="return saveCentre(event)" style="max-width:700px">
    <div class="card">
      <div class="form-group">
        <label>Nom del centre *</label>
        <input type="text" id="nomCentre" required>
      </div>
      <h3>Adreça</h3>
      <div class="form-group">
        <label>Cerca carrer</label>
        <div class="autocomplete-wrap">
          <input type="text" id="streetSearch" placeholder="Escriu nom del carrer..." autocomplete="off">
          <div class="autocomplete-dropdown" id="streetDropdown" style="display:none"></div>
        </div>
      </div>
      <div id="selectedStreet" style="display:none;padding:10px;background:#e6f4f0;border-radius:6px;margin-bottom:12px;">
        <p id="streetDisplay" style="font-weight:600;"></p>
        <p id="streetDetails" style="font-size:var(--fs-sm);color:var(--color-text-muted);"></p>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Número *</label>
          <input type="text" id="numCalle" required>
        </div>
        <div class="form-group">
          <label>Pis</label>
          <input type="text" id="pis">
        </div>
        <div class="form-group">
          <label>Escala</label>
          <input type="text" id="escala">
        </div>
      </div>
      <input type="hidden" id="idCallejero">
    </div>
    <div class="form-actions" style="display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary" id="btnSave">Guardar Centre</button>
      <button type="button" class="btn btn-secondary" onclick="window.location.href='/centres.html'">Cancel·lar</button>
    </div>
  </form>
</main>
<div class="toast" id="toast"></div>
<script src="/js/sidebar.js"></script>
<script src="/js/validate.js"></script>
<script>
let searchTimeout;

async function initForm() {
    if (!requireAuth()) return;
    const role = getRole();
    if (role !== 1 && role !== 2) {
        await alertModal('No tens permís per crear centres');
        window.location.href = '/centres.html';
        return;
    }
    renderSidebar('centres');
}

document.getElementById('streetSearch').addEventListener('input', function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(searchStreets, 300);
});

document.addEventListener('click', function(e) {
    if (!e.target.closest('.autocomplete-wrap')) {
        document.getElementById('streetDropdown').style.display = 'none';
    }
});

async function searchStreets() {
    const q = document.getElementById('streetSearch').value.trim();
    const dropdown = document.getElementById('streetDropdown');
    if (q.length < 2) { dropdown.style.display = 'none'; return; }
    try {
        const res = await authFetch(`/callejero?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (data.length) {
            dropdown.innerHTML = data.map(s =>
                `<div onclick="selectStreet(${s.idcallejero}, '${s.tipus_via.replace(/'/g, "\\'")}', '${s.Nom_calle.replace(/'/g, "\\'")}', '${s.barri.replace(/'/g, "\\'")}', '${s.codi_postal}')">
                    ${s.tipus_via} ${s.Nom_calle} — ${s.barri} (${s.codi_postal})
                </div>`
            ).join('');
            dropdown.style.display = 'block';
        } else {
            dropdown.innerHTML = '<div style="padding:8px;color:var(--color-text-soft);font-size:var(--fs-sm);">No s\'ha trobat cap carrer. Només usuaris amb accés Total poden crear-ne de nous.</div>';
            dropdown.style.display = 'block';
        }
    } catch {}
}

function selectStreet(id, tipusVia, nomCalle, barri, cp) {
    document.getElementById('idCallejero').value = id;
    document.getElementById('streetSearch').value = `${tipusVia} ${nomCalle}`;
    document.getElementById('selectedStreet').style.display = 'block';
    document.getElementById('streetDisplay').textContent = `${tipusVia} ${nomCalle}`;
    document.getElementById('streetDetails').textContent = `${barri} (${cp})`;
    document.getElementById('streetDropdown').style.display = 'none';
}

async function saveCentre(e) {
    e.preventDefault();

    const v = validateForm([
        { id: 'nomCentre', rules: ['required'] },
        { id: 'numCalle',  rules: ['required', 'number'] },
    ]);
    if (!v.ok) return;

    const nomCentre = document.getElementById('nomCentre').value.trim();
    const idCallejero = document.getElementById('idCallejero').value;
    const numCalle = document.getElementById('numCalle').value.trim();
    // El carrer es tria d'una llista (camp ocult): avís puntual amb toast
    if (!idCallejero) { showToast('Cal seleccionar un carrer de la llista', 'error'); return; }
    const pis = document.getElementById('pis').value.trim();
    const escala = document.getElementById('escala').value.trim();

    try {
        showLoading();
        const centreRes = await authFetch('/centre-activitats', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nom_centre_activitats: nomCentre,
                direccio: { idcallejero: parseInt(idCallejero), Num_calle: numCalle, Pis: pis || null, Escala: escala || null }
            })
        });
        const centreData = await centreRes.json();
        if (centreRes.ok) {
            notifyAndRedirect('Centre creat', `/centre.html?id=${centreData.id}`);
        } else {
            showToast(centreData.message || 'Error creant centre', 'error');
        }
    } catch (err) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

initForm();
</script>
</body>
</html>
