<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cercador de carrers</title>
<style>
* { box-sizing: border-box; }
body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
label { display: block; margin-top: 1rem; font-weight: 600; }
select, input { width: 100%; padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
input[readonly] { background: #f5f5f5; }
.autocomplete-wrap { position: relative; }
.dropdown { position: absolute; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto; background: #fff; border: 1px solid #ccc; border-top: 0; z-index: 10; display: none; }
.dropdown div { padding: 0.5rem; cursor: pointer; }
.dropdown div:hover, .dropdown div.selected { background: #007bff; color: #fff; }
</style>
</head>
<body>
<h1>Cercador de carrers</h1>

<label for="tipusVia">Tipus de via</label>
<select id="tipusVia">
    <option value="">-- Selecciona --</option>
</select>

<label for="nomCalle">Nom del carrer</label>
<div class="autocomplete-wrap">
    <input type="text" id="nomCalle" placeholder="Escriu almenys 3 caràcters..." autocomplete="off">
    <div class="dropdown" id="dropdown"></div>
</div>

<label for="barri">Barri</label>
<input type="text" id="barri" readonly>

<label for="codiPostal">Codi postal</label>
<input type="text" id="codiPostal" readonly>

<script>
const tipusViaSelect = document.getElementById("tipusVia");
const nomCalleInput = document.getElementById("nomCalle");
const barriInput = document.getElementById("barri");
const cpInput = document.getElementById("codiPostal");
const dropdown = document.getElementById("dropdown");

let debounceTimer = null;
let lastQuery = "";
let lastResults = [];

tipusViaSelect.addEventListener("change", onFilterChange);
nomCalleInput.addEventListener("input", onFilterChange);

function onFilterChange() {
    const q = nomCalleInput.value.trim();
    if (q.length < 3) {
        dropdown.style.display = "none";
        barriInput.value = "";
        cpInput.value = "";
        return;
    }

    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        if (q === lastQuery) return;
        lastQuery = q;
        fetchResults();
    }, 500);
}

async function fetchResults() {
    const tipus_via = tipusViaSelect.value;
    const q = nomCalleInput.value.trim();
    if (q.length < 3) return;

    let url = `/callejero?q=${encodeURIComponent(q)}`;
    if (tipus_via) url += `&tipus_via=${encodeURIComponent(tipus_via)}`;

    try {
        const res = await fetch(url);
        if (!res.ok) return;
        lastResults = await res.json();
        showDropdown(lastResults);
        autoFill(lastResults);
    } catch { }
}

function showDropdown(results) {
    dropdown.innerHTML = "";
    if (results.length === 0) {
        dropdown.style.display = "none";
        return;
    }
    for (const r of results) {
        const div = document.createElement("div");
        div.textContent = r.Nom_complet;
        div.addEventListener("click", () => selectResult(r));
        dropdown.appendChild(div);
    }
    dropdown.style.display = "block";
}

function selectResult(r) {
    nomCalleInput.value = r.Nom_complet;
    barriInput.value = r.barri || "";
    cpInput.value = r.codi_postal || "";
    dropdown.style.display = "none";
    lastQuery = r.Nom_complet;
}

function autoFill(results) {
    if (results.length === 0) {
        barriInput.value = "";
        cpInput.value = "";
        return;
    }
    const barris = new Set(results.map(r => r.barri).filter(Boolean));
    const cps = new Set(results.map(r => r.codi_postal).filter(Boolean));
    barriInput.value = barris.size === 1 ? [...barris][0] : "";
    cpInput.value = cps.size === 1 ? [...cps][0] : "";
}

document.addEventListener("click", (e) => {
    if (!e.target.closest(".autocomplete-wrap")) {
        dropdown.style.display = "none";
    }
});

async function loadTipusVia() {
    try {
        const res = await fetch("/tipusVia");
        if (!res.ok) return;
        const items = await res.json();
        for (const item of items) {
            const opt = document.createElement("option");
            opt.value = item.idTipus_via;
            opt.textContent = item.Nom;
            tipusViaSelect.appendChild(opt);
        }
    } catch { }
}

loadTipusVia();
</script>
</body>
</html>
