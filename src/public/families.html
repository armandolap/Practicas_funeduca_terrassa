<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Famílies — FunEduca CRM</title>
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <h1>Famílies</h1>
  <div class="filters">
    <input type="text" id="searchQ" placeholder="Cognom familiar..." oninput="debounceSearch()">
    <label>Estructura</label>
    <select id="estructuraFilter" onchange="loadFamilies()"><option value="">Totes</option></select>
    <label>Barri</label>
    <select id="barriFilter" onchange="loadFamilies()"><option value="">Tots</option></select>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Cognom</th><th>Membres</th><th>Menors</th><th>Majors</th><th>Estructura</th></tr></thead>
      <tbody id="familyList"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</main>
<script src="/js/sidebar.js"></script>
<script>
let currentPage = 0;
const PAGE_SIZE = 15;
const debounceSearch = debounce(() => { currentPage = 0; loadFamilies(); }, 300);

async function loadFilterOptions() {
    try {
        const [estRes, barriRes] = await Promise.all([
            authFetch('/estFamilia'),
            authFetch('/barri')
        ]);
        const est = await estRes.json();
        const barris = await barriRes.json();
        document.getElementById('estructuraFilter').innerHTML = '<option value="">Totes</option>' + est.map(e => `<option value="${e.idEstructura_familiar}">${e.Nom_est_fam}</option>`).join('');
        document.getElementById('barriFilter').innerHTML = '<option value="">Tots</option>' + barris.map(b => `<option value="${b.idBarri}">${b.Nom}</option>`).join('');
    } catch {}
}

async function loadFamilies() {
    if (!requireAuth()) return;
    const q = document.getElementById('searchQ').value.trim();
    const estructura = document.getElementById('estructuraFilter').value;
    const barri = document.getElementById('barriFilter').value;

    const params = new URLSearchParams({ offset: currentPage * PAGE_SIZE, limit: PAGE_SIZE });
    if (q) params.set('q', q);
    if (estructura) params.set('estructura', estructura);
    if (barri) params.set('barri', barri);

    try {
        const res = await authFetch(`/familia?${params}`);
        const data = await res.json();
        const rows = data.rows || data || [];
        const total = data.total || rows.length;
        const tbody = document.getElementById('familyList');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--color-text-soft);">No hi ha famílies</td></tr>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        tbody.innerHTML = rows.map(f => `
            <tr class="clickable" onclick="window.location.href='/familia.html?id=${f.idFamilia}'">
                <td><strong>${f.Cognom_familiar || ''}</strong></td>
                <td>${f.num_membres || 0}</td>
                <td>${f.num_menors || 0}</td>
                <td>${f.num_majors || 0}</td>
                <td>${f.estructura_familiar_nom || ''}</td>
            </tr>
        `).join('');
        const totalPages = Math.ceil(total / PAGE_SIZE);
        renderPagination('pagination', currentPage, totalPages, 'goPage', total);
    } catch {}
}

function goPage(page) { if (page < 0) return; currentPage = page; loadFamilies(); }

renderSidebar('families');
loadFilterOptions();
loadFamilies();
</script>
</body>
</html>
