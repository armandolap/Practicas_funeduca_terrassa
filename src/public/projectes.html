<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projectes — FunEduca CRM</title>
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <h1>Projectes</h1>
  <div class="filters">
    <button class="btn btn-sm btn-secondary" data-filter="todos" onclick="setFilter('todos')">Tots</button>
    <button class="btn btn-sm btn-secondary" data-filter="activos" onclick="setFilter('activos')">Actius</button>
    <button class="btn btn-sm btn-secondary" data-filter="futuros" onclick="setFilter('futuros')">Futurs</button>
    <button class="btn btn-sm btn-secondary" data-filter="pasados" onclick="setFilter('pasados')">Passats</button>
    <input type="text" id="searchQ" placeholder="Cerca per nom..." oninput="debounceSearch()">
    <button class="btn btn-success" id="btnCrear" onclick="window.location.href='/projecte-crear.html'" style="display:none">+ Nou projecte</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nom</th><th>Inici</th><th>Fi</th><th>Places</th><th>Inscrits</th><th>Responsable</th><th>Centre</th></tr></thead>
      <tbody id="projectList"></tbody>
    </table>
  </div>
</main>
<script src="/js/sidebar.js"></script>
<script>
let currentFilter = 'todos';
const debounceSearch = debounce(loadProjects, 300);

function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('[data-filter]').forEach(b => b.className = 'btn btn-sm btn-secondary');
    document.querySelector(`[data-filter="${filter}"]`).className = 'btn btn-sm btn-primary';
    loadProjects();
}

async function loadProjects() {
    if (!requireAuth()) return;
    const q = document.getElementById('searchQ').value.trim();
    const params = new URLSearchParams({ filter: currentFilter });
    if (q) params.set('q', q);
    try {
        const res = await authFetch(`/projectes?${params}`);
        const projects = await res.json();
        const tbody = document.getElementById('projectList');
        if (!projects.length) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--color-text-soft);">No hi ha projectes</td></tr>';
            return;
        }
        tbody.innerHTML = projects.map(p => `
            <tr class="clickable" onclick="window.location.href='/projecte.html?id=${p.idProyecto}'">
                <td><strong>${p.Nom_projecte || ''}</strong></td>
                <td>${p.fecha_inicio_act ? new Date(p.fecha_inicio_act).toLocaleDateString() : '-'}</td>
                <td>${p.fecha_fin_act ? new Date(p.fecha_fin_act).toLocaleDateString() : '-'}</td>
                <td>${p.plazas || 0}</td>
                <td>${p.inscritos || 0}</td>
                <td onclick="event.stopPropagation()">${renderResponsables(p.responsables)}</td>
                <td>${p.nom_centre_activitats || '-'}</td>
            </tr>
        `).join('');
    } catch {}
}

const RESP_TIPUS = {
    1: { nom: 'Zona', badge: 'badge-blue' },
    2: { nom: 'Projecte', badge: 'badge-green' },
    3: { nom: 'Treballador', badge: 'badge-gray' }
};

function renderResponsableLink(r) {
    const t = RESP_TIPUS[r.tipus_responsable] || { nom: '', badge: 'badge-gray' };
    const nom = `${r.Nom || ''} ${r.Cognoms || ''}`.trim();
    return `<a href="/usuari.html?id=${r.idUsuario_APP}" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;">
                <span class="badge ${t.badge}">${t.nom}</span>${nom}
            </a>`;
}

function parseResponsables(resp) {
    if (!resp) return [];
    return resp.split('\x1e').map(s => {
        const [idUsuario_APP, Nom, Cognoms, tipus_responsable] = s.split('\x1f');
        return { idUsuario_APP, Nom, Cognoms, tipus_responsable: parseInt(tipus_responsable) };
    });
}

function renderResponsables(resp) {
    const list = parseResponsables(resp);
    if (!list.length) return '-';
    if (list.length === 1) return renderResponsableLink(list[0]);
    return `<details class="resp-details">
                <summary>${list.length} responsables</summary>
                <div class="resp-list">${list.map(renderResponsableLink).join('')}</div>
            </details>`;
}

function checkRole() {
    const role = getRole();
    if (role === 1 || role === 2) {
        document.getElementById('btnCrear').style.display = 'inline-flex';
    }
}

renderSidebar('projectes');
checkRole();
setFilter('todos');
</script>
</body>
</html>
