<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projectes — FunEduca CRM</title>
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <h1>Projectes</h1>
  <div class="filters">
    <button class="btn btn-sm btn-secondary" data-filter="todos" onclick="setFilter('todos')">Tots</button>
    <button class="btn btn-sm btn-secondary" data-filter="activos" onclick="setFilter('activos')">Actius</button>
    <button class="btn btn-sm btn-secondary" data-filter="futuros" onclick="setFilter('futuros')">Futurs</button>
    <button class="btn btn-sm btn-secondary" data-filter="pasados" onclick="setFilter('pasados')">Passats</button>
    <input type="text" id="searchQ" placeholder="Cerca per nom..." oninput="debounceSearch()">
    <button class="btn btn-success" id="btnCrear" onclick="window.location.href='/projecte-crear.html'" style="display:none">+ Nou projecte</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nom</th><th>Inici</th><th>Fi</th><th>Places</th><th>Inscrits</th><th>Responsable</th><th>Centre</th></tr></thead>
      <tbody id="projectList"></tbody>
    </table>
  </div>
</main>
<script src="/js/sidebar.js"></script>
<script>
let currentFilter = 'todos';
const debounceSearch = debounce(loadProjects, 300);

function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('[data-filter]').forEach(b => b.className = 'btn btn-sm btn-secondary');
    document.querySelector(`[data-filter="${filter}"]`).className = 'btn btn-sm btn-primary';
    loadProjects();
}

async function loadProjects() {
    if (!requireAuth()) return;
    const q = document.getElementById('searchQ').value.trim();
    const params = new URLSearchParams({ filter: currentFilter });
    if (q) params.set('q', q);
    try {
        const res = await authFetch(`/projectes?${params}`);
        const projects = await res.json();
        const tbody = document.getElementById('projectList');
        if (!projects.length) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--color-text-soft);">No hi ha projectes</td></tr>';
            return;
        }
        tbody.innerHTML = projects.map(p => `
            <tr class="clickable" onclick="window.location.href='/projecte.html?id=${p.idProyecto}'">
                <td><strong>${p.Nom_projecte || ''}</strong></td>
                <td>${p.fecha_inicio_act ? new Date(p.fecha_inicio_act).toLocaleDateString() : '-'}</td>
                <td>${p.fecha_fin_act ? new Date(p.fecha_fin_act).toLocaleDateString() : '-'}</td>
                <td>${p.plazas || 0}</td>
                <td>${p.inscritos || 0}</td>
                <td>${p.responsable_zona_nom ? `${p.responsable_zona_nom} ${p.responsable_zona_cognoms || ''}` : '-'}</td>
                <td>${p.nom_centre_activitats || '-'}</td>
            </tr>
        `).join('');
    } catch {}
}

function checkRole() {
    const role = getRole();
    if (role === 1 || role === 2) {
        document.getElementById('btnCrear').style.display = 'inline-flex';
    }
}

renderSidebar('projectes');
checkRole();
setFilter('todos');
</script>
</body>
</html>
