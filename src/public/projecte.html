<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projecte — FunEduca CRM</title>
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <div id="projectContent"></div>
</main>
<div class="toast" id="toast"></div>
<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Afegir participant</h2>
    <div class="form-group">
      <label>Cerca client</label>
      <input type="text" id="clientSearch" placeholder="Nom o cognoms..." oninput="debounceClientSearch()">
    </div>
    <div id="clientResults" style="max-height:300px;overflow-y:auto;"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel·lar</button>
    </div>
  </div>
</div>
<script src="/js/sidebar.js"></script>
<script src="/js/validate.js"></script>
<script>
let projectId = new URLSearchParams(location.search).get('id');
const debounceClientSearch = debounce(searchClients, 300);

async function searchClients() {
    const q = document.getElementById('clientSearch').value.trim();
    if (!q || q.length < 2) { document.getElementById('clientResults').innerHTML = ''; return; }
    try {
        const res = await authFetch(`/client?q=${encodeURIComponent(q)}&limit=10`);
        const data = await res.json();
        const rows = data.rows || data || [];
        const list = document.getElementById('clientResults');
        list.innerHTML = rows.map(c => `
            <div style="padding:8px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;">
                <span>${c.Nom} ${c.Cognoms} (${c.Cognom_familiar || ''})</span>
                <button class="btn btn-sm btn-primary" onclick="addClient(${c.idClient})">Afegir</button>
            </div>
        `).join('');
        if (!rows.length) list.innerHTML = '<div style="padding:12px;color:var(--color-text-soft);">Cap resultat</div>';
    } catch {}
}

async function addClient(clientId) {
    try {
        showLoading();
        const res = await authFetch(`/projectes/${projectId}/clients`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientIds: [clientId] })
        });
        if (res.ok) { showToast('Participant afegit', 'success'); closeModal(); loadProject(); }
        else { showToast('Error en afegir participant', 'error'); }
    } catch (err) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

async function removeClient(clientId) {
    if (!await confirmModal('Eliminar aquest participant del projecte?')) return;
    try {
        showLoading();
        const res = await authFetch(`/projectes/${projectId}/clients/${clientId}`, {
            method: 'DELETE'
        });
        if (res.ok) { showToast('Participant eliminat', 'success'); loadProject(); }
        else { showToast('Error en eliminar participant', 'error'); }
    } catch (err) { showToast('Error de connexió', 'error'); }
    finally { hideLoading(); }
}

function openAddModal() { document.getElementById('modalOverlay').style.display = 'flex'; }
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; document.getElementById('clientResults').innerHTML = ''; document.getElementById('clientSearch').value = ''; }

async function loadProject() {
    if (!requireAuth()) return;
    try {
        const res = await authFetch(`/projectes/${projectId}`);
        const p = await res.json();
        if (!p) { document.getElementById('projectContent').innerHTML = '<p>Projecte no trobat</p>'; return; }

        const now = new Date();
        const start = p.fecha_inicio_act ? new Date(p.fecha_inicio_act) : null;
        const end = p.fecha_fin_act ? new Date(p.fecha_fin_act) : null;
        let estatProjecte = 'actiu';
        if (start && start > now) estatProjecte = 'futur';
        if (end && end < now) estatProjecte = 'tancat';
        const role = getRole();
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const isResponsable = (p.responsables || []).some(r => r.idUsuario_APP === user.idUsuario_APP && (r.tipus_responsable === 1 || r.tipus_responsable === 2));
        const canEdit = role === 1 || role === 2 || isResponsable;

        function renderRespSection(responsables, tipo, label, color) {
            const items = (responsables || []).filter(r => r.tipus_responsable === tipo);
            if (!items.length) return `<div class="card"><h3>${label}</h3><p style="color:var(--color-text-soft);">Cap</p></div>`;
            return `<div class="card"><h3>${label} (${items.length})</h3>` +
                items.map(r => `<p><strong>${r.Nom || ''} ${r.Cognoms || ''}</strong></p>`).join('') +
                `</div>`;
        }

        document.getElementById('projectContent').innerHTML = `
            <a class="back-link" href="/projectes.html">← Tornar</a>
            <div class="detail-header">
                <h1>${p.Nom_projecte || ''}</h1>
                <div class="subtitle" style="margin-top:8px">
                    <span class="badge ${estatProjecte === 'actiu' ? 'badge-green' : estatProjecte === 'futur' ? 'badge-blue' : 'badge-gray'}">${estatProjecte === 'actiu' ? 'Actiu' : estatProjecte === 'futur' ? 'Futur' : 'Tancat'}</span>
                    ${canEdit ? `<button class="btn btn-sm btn-secondary" onclick="window.location.href='/projecte-crear.html?id=${projectId}'" style="float:right">Editar</button>` : ''}
                </div>
            </div>
            <div class="info-row">
                <div class="info-card"><div class="label">Inici</div><div class="value">${p.fecha_inicio_act ? new Date(p.fecha_inicio_act).toLocaleDateString() : '-'}</div></div>
                <div class="info-card"><div class="label">Fi</div><div class="value">${p.fecha_fin_act ? new Date(p.fecha_fin_act).toLocaleDateString() : '-'}</div></div>
                <div class="info-card"><div class="label">Places</div><div class="value">${p.plazas || 0}</div></div>
                <div class="info-card"><div class="label">Inscrits</div><div class="value">${p.inscritos || 0}</div></div>
            </div>
            ${renderRespSection(p.responsables, 1, 'Responsable de zona', '#e6f4f0')}
            ${renderRespSection(p.responsables, 2, 'Responsables de projecte', '#e6f4f0')}
            ${renderRespSection(p.responsables, 3, 'Treballadors', '#fef3c7')}
            <div class="card">
                <h3>Centre d'activitats</h3>
                <p><strong>${p.nom_centre_activitats || '-'}</strong></p>
                ${p.tipus_via ? `<p>${p.tipus_via} ${p.Nom_calle || ''}, ${p.Num_calle || ''}${p.Pis ? `, ${p.Pis}${p.Escala ? ` ${p.Escala}` : ''}` : ''}</p>` : ''}
                ${p.barri ? `<p>${p.barri}, CP ${p.codi_postal || ''}</p>` : ''}
            </div>
            <div class="card">
                <h2>Descripció</h2>
                <p>${p.Descripcio || 'Sense descripció'}</p>
            </div>
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h3>Participants (${(p.participants || []).length})</h3>
                    ${canEdit ? `<button class="btn btn-sm btn-primary" onclick="openAddModal()">+ Afegir</button>` : ''}
                </div>
                <table>
                    <thead><tr><th>Nom</th><th>Cognoms</th><th>Família</th>${canEdit ? '<th></th>' : ''}</tr></thead>
                    <tbody>
                        ${(p.participants || []).map(c => `
                            <tr>
                                <td><a href="/client.html?id=${c.idClient}">${c.Nom}</a></td>
                                <td>${c.Cognoms}</td>
                                <td>${c.Cognom_familiar || ''}</td>
                                ${canEdit ? `<td><button class="btn btn-sm btn-danger" onclick="removeClient(${c.idClient})">Treure</button></td>` : ''}
                            </tr>
                        `).join('') || '<tr><td colspan="3" style="text-align:center;color:var(--color-text-soft);">Cap participant</td></tr>'}
                    </tbody>
                </table>
            </div>
        `;
    } catch (err) { document.getElementById('projectContent').innerHTML = '<p>Error carregant projecte</p>'; }
}

renderSidebar('projectes');
if (!projectId) { document.getElementById('projectContent').innerHTML = '<p>ID de projecte no proporcionat</p>'; }
else { loadProject(); }
</script>
</body>
</html>
