<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centres d'activitats — FunEduca CRM</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <h1>Centres d'activitats</h1>
  <div class="filters">
    <input type="text" id="searchQ" placeholder="Nom del centre o carrer..." oninput="debounceSearch()">
    <button class="btn btn-success btn-sm" id="btnNouCentre" onclick="window.location.href='/centre-crear.html'" style="display:none">+ Nou centre</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nom</th><th>Adreça</th><th>Barri</th><th>CP</th><th>Projectes</th></tr></thead>
      <tbody id="centreList"></tbody>
    </table>
  </div>
</main>
<script src="/js/sidebar.js"></script>
<script>
let searchTimeout;

function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => { loadCentres(); }, 300);
}

async function loadCentres() {
    if (!requireAuth()) return;
    const q = document.getElementById('searchQ').value.trim();
    const params = q ? `?q=${encodeURIComponent(q)}` : '';
    try {
        const res = await fetch(`/centre-activitats${params}`, {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const data = await res.json();
        const tbody = document.getElementById('centreList');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:#94a3b8;">No hi ha centres</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(c => `
            <tr class="clickable" onclick="window.location.href='/centre.html?id=${c.idcentre_activitats}'">
                <td>${c.nom_centre_activitats || ''}</td>
                <td>${c.tipus_via || ''} ${c.Nom_calle || ''}, ${c.Num_calle || ''}${c.Pis ? ' ' + c.Pis : ''}${c.Escala ? ' ' + c.Escala : ''}</td>
                <td>${c.barri || ''}</td>
                <td>${c.codi_postal || ''}</td>
                <td style="font-size:12px;color:#64748b;">${c.num_projectes || 0}</td>
            </tr>
        `).join('');
    } catch (err) { console.error(err); }
}

function checkCreateRole() {
    const role = getRole();
    if (role === 1 || role === 2) {
        document.getElementById('btnNouCentre').style.display = 'inline-flex';
    }
}

renderSidebar('centres');
checkCreateRole();
loadCentres();
</script>
</body>
</html>
