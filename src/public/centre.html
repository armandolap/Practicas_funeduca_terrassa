<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centre — FunEduca CRM</title>
<link rel="stylesheet" href="/css/main.css">
<style>.projectes-section { margin-top: 24px; }</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <div id="centreDetail">
    <h1 id="centreNom"></h1>
    <p id="adrecaCentre" style="color:#64748b;"></p>
    <div style="display:flex;gap:8px;margin:12px 0;">
      <span class="badge badge-info" id="numProjectes"></span>
    </div>
  </div>
  <div class="projectes-section">
    <h2>Projectes</h2>
    <div class="filters">
      <input type="text" id="searchQ" placeholder="Cerca projecte..." oninput="debounceSearch()">
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nom</th><th>Data inici</th><th>Data fi</th><th>Places</th><th>Inscrits</th><th>Estat</th></tr></thead>
        <tbody id="projectesList"></tbody>
      </table>
    </div>
  </div>
</main>
<script src="/js/sidebar.js"></script>
<script>
const centreId = new URLSearchParams(location.search).get('id');
const debounceSearch = debounce(() => loadProjectes(), 300);

async function loadCentre() {
    if (!requireAuth() || !centreId) return;
    try {
        const res = await authFetch(`/centre-activitats/${centreId}`);
        const c = await res.json();
        if (!c) { document.getElementById('centreDetail').innerHTML = '<p>Centre no trobat</p>'; return; }
        document.getElementById('centreNom').textContent = c.nom_centre_activitats || '';
        document.getElementById('adrecaCentre').textContent = `${c.tipus_via || ''} ${c.Nom_calle || ''}, ${c.Num_calle || ''}${c.Pis ? ', ' + c.Pis : ''}${c.Escala ? ' ' + c.Escala : ''} — ${c.barri || ''} (${c.codi_postal || ''})`;
        document.getElementById('numProjectes').textContent = `${c.num_projectes || 0} projectes`;
    } catch {}
}

async function loadProjectes() {
    if (!requireAuth() || !centreId) return;
    const q = document.getElementById('searchQ').value.trim();
    try {
        const res = await authFetch(`/projectes/centre/${centreId}?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        const tbody = document.getElementById('projectesList');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#94a3b8;">No hi ha projectes en aquest centre</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(p => {
            const avui = new Date();
            const inici = p.fecha_inicio_act ? new Date(p.fecha_inicio_act) : null;
            const fi = p.fecha_fin_act ? new Date(p.fecha_fin_act) : null;
            let estat = 'Actiu';
            if (inici && inici > avui) estat = 'Futur';
            else if (fi && fi < avui) estat = 'Tancat';
            const cls = estat === 'Actiu' ? 'badge-success' : estat === 'Futur' ? 'badge-info' : 'badge-secondary';
            return `<tr class="clickable" onclick="window.location.href='/projecte.html?id=${p.idProyecto}'">
                <td>${p.Nom_projecte || ''}</td>
                <td>${p.fecha_inicio_act ? p.fecha_inicio_act.split('T')[0] : '-'}</td>
                <td>${p.fecha_fin_act ? p.fecha_fin_act.split('T')[0] : '-'}</td>
                <td>${p.plazas || 0}</td>
                <td>${p.inscritos || 0}</td>
                <td><span class="badge ${cls}">${estat}</span></td>
            </tr>`;
        }).join('');
    } catch {}
}

renderSidebar('centres');
loadCentre();
loadProjectes();
</script>
</body>
</html>
