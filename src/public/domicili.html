<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domicili — FunEduca CRM</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">
  <div id="domiciliContent"></div>
</main>
<script src="/js/sidebar.js"></script>
<script>
const domiciliId = new URLSearchParams(location.search).get('id');

async function loadDomicili() {
    if (!requireAuth()) return;
    try {
        const res = await fetch(`/domicili/${domiciliId}`, {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        const d = await res.json();
        if (!d || !d.idDomicili) {
            document.getElementById('domiciliContent').innerHTML = '<p>Domicili no trobat</p>';
            return;
        }

        document.getElementById('domiciliContent').innerHTML = `
            <a class="back-link" href="/domicilis.html">← Tornar</a>
            <div class="detail-header">
                <h1>${d.tipus_via || ''} ${d.Nom_calle || ''}, ${d.Num_calle || ''}${d.Pis ? `, ${d.Pis}${d.Escala ? ` ${d.Escala}` : ''}` : ''}</h1>
                <div class="subtitle">${d.barri || ''}, CP ${d.codi_postal || ''} · ${d.tipus_domicili_nom || ''}</div>
            </div>

            <div class="card">
                <h3>Persones (${(d.persones || []).length})</h3>
                <table>
                    <thead><tr><th>Nom</th><th>Cognoms</th><th>Edat</th><th>Rol</th><th>Família</th></tr></thead>
                    <tbody>
                        ${(d.persones || []).map(p => `
                            <tr class="clickable" onclick="window.location.href='/client.html?id=${p.idClient}'">
                                <td>${p.Nom || ''}</td>
                                <td>${p.Cognoms || ''}</td>
                                <td>${p.C_edad || 0}</td>
                                <td>${p.Nom_rol || ''}</td>
                                <td><a href="/familia.html?id=${p.idFamilia}">${p.Cognom_familiar || ''}</a></td>
                            </tr>
                        `).join('') || '<tr><td colspan="5" style="text-align:center;color:#94a3b8;">Cap persona</td></tr>'}
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h3>Famílies</h3>
                ${(d.families || []).map(f => `
                    <div style="padding:6px 0;"><a href="/familia.html?id=${f.idFamilia}">${f.Cognom_familiar || ''}</a> · ${f.estructura_familiar_nom || ''} · ${f.num_membres || 0} membres</div>
                `).join('') || '<p style="color:#94a3b8;">Cap família</p>'}
            </div>

            <div class="card">
                <h3>Projectes relacionats</h3>
                ${(d.projectes || []).map(p => `
                    <div style="padding:6px 0;"><a href="/projecte.html?id=${p.idProyecto}">${p.Nom_projecte || ''}</a></div>
                `).join('') || '<p style="color:#94a3b8;">Cap projecte</p>'}
            </div>
        `;
    } catch (err) { console.error(err); document.getElementById('domiciliContent').innerHTML = '<p>Error carregant domicili</p>'; }
}

renderSidebar('domicilis');
if (!domiciliId) document.getElementById('domiciliContent').innerHTML = '<p>ID de domicili no proporcionat</p>';
else loadDomicili();
</script>
</body>
</html>
